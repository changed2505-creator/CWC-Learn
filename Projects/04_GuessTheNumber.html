<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Number Guessing Game</title>
    <style>
        html {
  font-family: sans-serif;
}

body {
  width: 300px;
  max-width: 750px;
  min-width: 480px;
  margin: 0 auto;
  background-color: #212121;
}

.lastResult {
  color: white;
  padding: 7px;
}

.guesses {
  color: white;
  padding: 7px;
}

button {
  background-color: #141414;
  color: #fff;
  width: 250px;
  height: 50px;
  border-radius: 25px;
  font-size: 30px;
  border-style: none;
  margin-top: 30px;
  /* margin-left: 50px; */
}

#subt {
  background-color: #161616;
  color: #ffffff;
  width: 200px;
  height: 50px;
  border-radius: 10px;
  font-size: 20px;
  border-style: none;
  margin-top: 50px;
  /* margin-left: 75px; */
}

#guessField {
  color: #000;
  width: 250px;
  height: 50px;
  font-size: 30px;
  border-style: none;
  margin-top: 25px;

  /* margin-left: 50px; */
  border: 5px solid #6c6d6d;
  text-align: center;
}

#guess {
  font-size: 55px;
  /* margin-left: 90px; */
  margin-top: 120px;
  color: #fff;
}

.guesses {
  background-color: #7a7a7a;
}

#wrapper {
  box-sizing: border-box;
  text-align: center;
  width: 450px;
  height: 550px;
  background-color: #474747;
  color: #fff;
  font-size: 25px;
}

  background-color: #161616;

  color: #fff;
  text-align: center;
}

p {
  font-size: 16px;
  text-align: center;
}

    </style>
</head>
<body style="background-color:#212121; color:#fff;">
  <nav>
    <a href="/" aria-current="page">Home</a>
    <a target="_blank" href="https://www.youtube.com/@chaiaurcode"
      >Youtube channel</a
    >
  </nav>
    
    <div id="wrapper">
      <h1>Number guessing game</h1>
    <p>Try and guess a random number between 1 and 100.</p>
    <p>You have 10 attempts to guess the right number.</p>
    </br>
        <form class="form">
            <label2 for="guessField" id="guess">Guess a number</label>
            <input type="text" id="guessField" class="guessField">
            <input type="submit" id="subt" value="Submit guess" class="guessSubmit">
        </form>

        <div class="resultParas">
            <p >Previous Guesses: <span class="guesses"></span></p>
            <p >Guesses Remaining: <span class="lastResult">10</span></p>
            <p class="lowOrHi"></p>
        </div>
    </div>
    <script>
        let randomNum = Math.floor(Math.random() * 100 + 1);
console.log(randomNum);

let inputVal = document.querySelector('#guessField');
let valSubmit = document.querySelector('#subt');
let restart = document.querySelector('.resultParas');
let allGuesses = document.querySelector('.guesses');
let remainingTurns = document.querySelector('.lastResult');
let lowOrHigh = document.querySelector('.lowOrHi');

let prevGuess = [];
let attempt = 1;

let para = document.createElement('p');

let gameStart = true;

if (gameStart === true) {
  startGame();
}

function startGame() {
  valSubmit.addEventListener('click', (e) => {
    e.preventDefault();
    let guess = parseInt(inputVal.value);
    console.log(guess);
    valValidation(guess);
  });
}

function valValidation(guess) {
  if (guess < 1) {
    alert(`Enter value greater than 1 : ${guess}`);
  } else if (guess > 100) {
    alert(`Enter value lesser than 100 : ${guess}`);
  } else if (isNaN(guess)) {
    alert(`Enter a valid no. : ${guess}`);
  } else {
    prevGuess.push(guess);
    if (attempt > 10) {
      notMatched(guess);
      sendMessage(`Game Over !!! The Random no. was ${randomNum}`);
      endTry();
    } else {
      notMatched(guess);
      verifyMatch(guess);
    }
  }
}

function verifyMatch(guess) {
  if (guess === randomNum) {
    sendMessage(`Your guess was right!!! ${guess}`);
    endTry();
  } else if (guess < randomNum) {
    sendMessage(`Your guess is a lower no. than the original.`);
  } else if (guess > randomNum) {
    sendMessage(`Your guess is a greater no. than the original.`);
  }
}

function notMatched(guess) {
  inputVal.value = '';
  allGuesses.innerHTML = `${prevGuess}`;
  attempt++;
  remainingTurns.innerHTML = `${11 - attempt}`;
}

function sendMessage(message) {
  lowOrHigh.innerHTML = `<h3>${message}</h3>`;
}

function endTry() {
  inputVal.value = '';
  inputVal.setAttribute('disabled', '');
  para.classList.add('button');
  para.innerHTML = `<input type="button" value="New game" id="but"> `;
  restart.appendChild(para);
  gameStart = false;
  nextTry();
}

function nextTry() {
  let newGame = document.querySelector('#but');
  newGame.addEventListener('click', (e) => {
    e.preventDefault();
    sendMessage('');
    randomNum = Math.floor(Math.random() * 100 + 1);
    prevGuess = [];
    attempt = 1;
    inputVal.removeAttribute('disabled');
    restart.removeChild(para);
    allGuesses.innerHTML = '';
    remainingTurns.innerHTML = `${11 - attempt}`;
    gameStart = true;
  });
}

    </script>
</body>
</html>
