<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Test</h1>
    <button id="start">Begin</button>
    <button id="stop">END</button>
</body>
<script>

    let begin = document.querySelector('#start')
    let end = document.querySelector('#stop')    

    begin.addEventListener('click', () => {
        function setter(set) {
            let date = new Date()
            console.log(`${set} : ${date.toLocaleTimeString()}`)
        } 
        const sIt = setInterval(setter, 2000, "TIME");
        
        end.addEventListener('click',()=>{
            clearInterval(sIt)
        })
    })

</script>

</html>
