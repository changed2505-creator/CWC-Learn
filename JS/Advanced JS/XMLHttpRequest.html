<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API</title>
    <style>
        .main {
            width: 200px;
            height: 200px;
            padding: 20px;
            background-color: aquamarine;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body style="background-color: gray;">
    <div class="main">
        <button id="but">Show Data</button>
        <div class="img"></div>
        <div class="data"></div>
        <img src="" alt="">
    </div>
</body>
<script>
    let url = "https://api.github.com/users/hiteshchoudhary";
    let img;
    let follow;

    let XmlR = new XMLHttpRequest();
    XmlR.open('GET', url)
    XmlR.onreadystatechange = function () {
        console.log(XmlR.readyState);
        if (XmlR.readyState === 4) {
            let data = JSON.parse(this.response)
            console.log(data);
            img = data.avatar_url
            console.log(img);
            follow = data.followers
            console.log(follow);
            let button = document.querySelector('#but')
            button.addEventListener('click', () => {
                let imgDiv = document.querySelector('.img')
                imgDiv.innerHTML = `<img style="padding=20px; height:150px; width:150px;" src="${img}" alt="image">`
                let followDiv = document.querySelector('.data')
                followDiv.innerHTML = `Followers : ${follow}`
                button.remove()
            })
        }
    }
    XmlR.send()   
</script>

</html>
