<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        .bg-gray{
            background-color: black;
            color:antiquewhite;
        }
    </style>
</head>
<body class="bg-gray">
    <div>
        <h1 class="heading" id="title">Lorem ipsum dolor sit amet. <span style="display:none">Lorem, ipsum dolor.</span></h1>
        <h2>Lorem ipsum dolor sit amet.</h2>
        <h2>Lorem ipsum dolor sit.</h2>
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. A, quod.</p>
    </div>

    <ul class="UL">
        <li class="Li-item">1</li>
        <li class="Li-item">2</li>
        <li class="Li-item">3</li>
    </ul>

    <script>
        let UL = document.querySelector(".UL");

        function addNo(num) {
            let newLi = document.createElement("li");
            newLi.appendChild(document.createTextNode(num));
            UL.appendChild(newLi)
        }
        addNo(4)

        let thirdChild = document.querySelector('li:nth-child(3)');
        // thirdChild.innerHTML = "2.5"

        let newLi = document.createElement('li');
        newLi.appendChild(document.createTextNode("2.5"))
        // thirdChild.replaceWith(newLi);

        // thirdChild.outerHTML = "<li>2.5</li>"


        thirdChild.remove();
    </script>
    
</body>
</html>
